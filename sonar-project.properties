# ============================================================================
# SonarQube configuration — ISO/IEC 25010 Reliability instrument
# (thesis paper, Table 4 and Section 3.2.4: continuous static code analysis
# to detect logic flaws, unhandled exceptions, and reliability fault points).
#
# Local SonarQube Community Build (current supported release):
#   1. Start the latest Community Build with its supported JDK 25 LTS runtime.
#   2. Create a project + token in the SonarQube UI.
#   3. Generate backend coverage first:
#        cd rag-thesis-backend
#        pytest --cov=routers --cov=services --cov=dependencies --cov=main --cov=config --cov=models --cov-report=xml
#   4. From the repository root:
#        sonar-scanner -Dsonar.host.url=http://localhost:9000 -Dsonar.token=<your-token>
#
# SonarCloud alternative: uncomment sonar.organization below, add the
# SONAR_TOKEN repository secret, and the CI workflow
# (.github/workflows/quality.yml) scans on every push to main.
# ============================================================================

sonar.projectKey=isu-thesis-ai-library
sonar.projectName=ISU Centralized AI-Powered Thesis Library
sonar.projectVersion=2.0.0
# sonar.organization=<your-sonarcloud-organization>

# Sources: FastAPI backend + React frontend
sonar.sources=rag-thesis-backend,rag-thesis-frontend/src
sonar.tests=rag-thesis-backend/tests

# Keep generated/vendored artifacts out of the analysis
sonar.exclusions=\
  rag-thesis-backend/.venv/**,\
  rag-thesis-backend/tests/**,\
  rag-thesis-backend/evaluation/results/**,\
  **/__pycache__/**,\
  rag-thesis-frontend/node_modules/**,\
  rag-thesis-frontend/dist/**

sonar.python.version=3.12
sonar.python.coverage.reportPaths=rag-thesis-backend/coverage.xml
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
