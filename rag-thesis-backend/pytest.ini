[pytest]
testpaths = tests
pythonpath = .
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore:Using .*httpx.* with .*starlette\.testclient.* is deprecated.*:starlette.exceptions.StarletteDeprecationWarning
markers =
    integration: destructive only inside an explicitly enabled disposable Supabase project
